<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg p-6 mb-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold">📚 Vocabulary Manager</h1>
                    <p class="text-sm opacity-90">Quản lý từ vựng của bạn</p>
                </div>
                <a href="/manage.html" class="bg-white/20 px-4 py-2 rounded-lg hover:bg-white/30 text-sm">
                    📖 Quản lý từ
                </a>
            </div>
        </div>

        <!-- Status Alert -->
        <div id="alert" class="hidden mb-4 p-4 rounded-lg"></div>

        <!-- Add Word Section -->
        <div class="bg-white rounded-lg shadow p-4 mb-4">
            <h2 class="text-lg font-semibold mb-3">➕ Thêm từ</h2>
            <textarea id="wordInput" placeholder="Nhập từ tiếng Anh (mỗi từ 1 dòng)"
                   rows="4"
                   class="w-full px-4 py-2 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            <button onclick="addWord()"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">
                Thêm vào queue
            </button>
        </div>

        <!-- Queue Section -->
        <div class="bg-white rounded-lg shadow p-4 mb-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold">📝 Hàng đợi (<span id="queueCount">0</span>)</h2>
                <button onclick="loadQueue()" class="text-blue-600 text-sm">🔄 Refresh</button>
            </div>
            <div id="queueList" class="space-y-2 mb-3 max-h-60 overflow-y-auto"></div>
            <button onclick="generateCollocations()" id="genBtn"
                    class="w-full bg-green-600 text-white py-2 rounded-lg font-medium hover:bg-green-700 disabled:bg-gray-400">
                🤖 Generate Collocations
            </button>
        </div>

        <!-- Actions -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="exportCSV()"
                    class="bg-purple-600 text-white py-2 rounded-lg font-medium hover:bg-purple-700">
                📥 Export CSV
            </button>
            <button onclick="deleteAll()"
                    class="bg-red-600 text-white py-2 rounded-lg font-medium hover:bg-red-700">
                🗑️ Xóa tất cả
            </button>
        </div>

        <!-- Settings Section -->
        <div class="bg-white rounded-lg shadow p-4">
            <h2 class="text-lg font-semibold mb-3">⚙️ Cài đặt</h2>
            <label class="block text-sm font-medium mb-2">Google AI API Key:</label>
            <input type="password" id="apiKeyInput" placeholder="AIza..."
                   class="w-full px-4 py-2 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="saveApiKey()"
                    class="w-full bg-gray-700 text-white py-2 rounded-lg font-medium hover:bg-gray-800">
                💾 Lưu API Key
            </button>
            <p class="text-xs text-gray-500 mt-2">
                Lấy API key từ <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-blue-600">Google AI Studio</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // Show alert
        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alert');
            const colors = {
                success: 'bg-green-100 text-green-800 border-green-300',
                error: 'bg-red-100 text-red-800 border-red-300',
                info: 'bg-blue-100 text-blue-800 border-blue-300'
            };
            alert.className = `p-4 rounded-lg border ${colors[type] || colors.info}`;
            alert.textContent = message;
            alert.classList.remove('hidden');
            setTimeout(() => alert.classList.add('hidden'), 3000);
        }

        // Add word to queue
        async function addWord() {
            const input = document.getElementById('wordInput').value.trim();
            if (!input) return showAlert('Vui lòng nhập từ', 'error');

            // Tách các từ theo dòng
            const words = input.split('\n')
                .map(w => w.trim())
                .filter(w => w.length > 0);

            if (words.length === 0) {
                return showAlert('Vui lòng nhập từ', 'error');
            }

            let addedCount = 0;
            let existsCount = 0;
            let invalidCount = 0;

            const validWords = [];

            for (const word of words) {
                // Kiểm tra định dạng
                if (!/^[a-zA-Z\s-]+$/.test(word)) {
                    invalidCount++;
                    continue;
                }

                // Kiểm tra tồn tại trong database
                try {
                    const res = await fetch(`${API_BASE}/api/check-word`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ word })
                    });
                    const data = await res.json();
                    if (data.exists) {
                        existsCount++;
                        continue;
                    }
                } catch (err) {
                    console.error(err);
                }

                validWords.push(word);
            }

            // Thêm vào queue trong MongoDB
            if (validWords.length > 0) {
                try {
                    const res = await fetch(`${API_BASE}/api/queue`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ words: validWords })
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        addedCount = data.addedCount;
                    }
                } catch (err) {
                    showAlert('Lỗi kết nối: ' + err.message, 'error');
                    return;
                }
            }

            // Clear input
            document.getElementById('wordInput').value = '';
            loadQueue();

            // Hiển thị thông báo
            let message = '';
            if (addedCount > 0) message += `Đã thêm ${addedCount} từ. `;
            if (existsCount > 0) message += `${existsCount} từ đã tồn tại. `;
            if (invalidCount > 0) message += `${invalidCount} từ không hợp lệ.`;

            if (addedCount > 0) {
                showAlert(message.trim(), 'success');
            } else {
                showAlert(message.trim() || 'Không có từ nào được thêm', 'error');
            }
        }

        // Load queue from MongoDB
        async function loadQueue() {
            try {
                const res = await fetch(`${API_BASE}/api/queue`);
                const data = await res.json();
                
                const queue = data.data || [];
                const list = document.getElementById('queueList');
                const count = document.getElementById('queueCount');
                const genBtn = document.getElementById('genBtn');

                count.textContent = queue.length;
                genBtn.disabled = queue.length === 0;

                if (queue.length === 0) {
                    list.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Chưa có từ nào</p>';
                    return;
                }

                list.innerHTML = queue.map((item) => `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded">
                        <span class="font-medium">${item.word}</span>
                        <button onclick="removeWord('${item._id}')" class="text-red-600 hover:text-red-800">✕</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading queue:', err);
            }
        }

        // Remove word from MongoDB queue
        async function removeWord(id) {
            try {
                const res = await fetch(`${API_BASE}/api/queue/${id}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.status === 'success') {
                    loadQueue();
                }
            } catch (err) {
                showAlert('Lỗi: ' + err.message, 'error');
            }
        }

        // Generate collocations
        async function generateCollocations() {
            const genBtn = document.getElementById('genBtn');
            genBtn.disabled = true;
            genBtn.textContent = '⏳ Đang xử lý...';

            try {
                // Get queue from MongoDB
                const queueRes = await fetch(`${API_BASE}/api/queue`);
                const queueData = await queueRes.json();
                const queue = queueData.data || [];

                if (queue.length === 0) {
                    showAlert('Queue trống', 'error');
                    return;
                }

                const words = queue.map(item => item.word);

                const res = await fetch(`${API_BASE}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ words })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    showAlert(`Đã tạo ${data.count} collocations!`, 'success');
                    
                    // Clear queue after successful generation
                    await fetch(`${API_BASE}/api/queue/clear`, { method: 'POST' });
                    loadQueue();
                } else {
                    showAlert('Lỗi: ' + data.message, 'error');
                }
            } catch (err) {
                showAlert('Lỗi kết nối: ' + err.message, 'error');
            } finally {
                genBtn.disabled = false;
                genBtn.textContent = '🤖 Generate Collocations';
            }
        }

        // Save API key
        async function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) return showAlert('Vui lòng nhập API key', 'error');

            if (!apiKey.startsWith('AIza')) {
                return showAlert('API key phải bắt đầu với "AIza"', 'error');
            }

            try {
                const res = await fetch(`${API_BASE}/api/save-apikey`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    showAlert('Đã lưu API key!', 'success');
                    document.getElementById('apiKeyInput').value = '';
                } else {
                    showAlert('Lỗi: ' + data.message, 'error');
                }
            } catch (err) {
                showAlert('Lỗi kết nối: ' + err.message, 'error');
            }
        }

        // Export CSV
        async function exportCSV() {
            try {
                window.location.href = `${API_BASE}/api/export-csv`;
                showAlert('Đang tải CSV...', 'info');
            } catch (err) {
                showAlert('Lỗi: ' + err.message, 'error');
            }
        }

        // Delete all
        async function deleteAll() {
            if (!confirm('Xóa TẤT CẢ dữ liệu? Không thể hoàn tác!')) return;

            try {
                const res = await fetch(`${API_BASE}/api/delete-all`, { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    showAlert(`Đã xóa ${data.deletedCount} collocations`, 'success');
                } else {
                    showAlert('Lỗi: ' + data.message, 'error');
                }
            } catch (err) {
                showAlert('Lỗi: ' + err.message, 'error');
            }
        }

        // Init
        loadQueue();
    </script>
</body>
</html>
